---
- name: Clone Dotfiles Repo
  git:
    repo: 'https://github.com/jcurtis4207/Dotfiles.git'
    dest: /dev/shm/Dotfiles
    clone: yes
    update: yes

- name: Find Dotfiles
  find:
    paths: "/dev/shm/Dotfiles"
    recurse: no
    hidden: True
  register: file_to_copy

- name: Copy Dotfiles
  copy:
    remote_src: True
    src: "{{ item.path}}"
    dest: /home/{{ ansible_user }}/
  no_log: True
  with_items: "{{ file_to_copy.files }}"

- name: Set Distro Variable
  replace:
    path: "/home/{{ ansible_user }}/.bash_aliases"
    regexp: '^distro=.*'
    replace: 'distro={{ distro_variable }}'

- name: Set User Variable
  replace:
    path: "/home/{{ ansible_user }}/.bash_aliases"
    regexp: '^user=.*'
    replace: 'user={{ ansible_user }}'

- name: Install Vim Plugins
  command: vim -E -s -c "source /home/{{ ansible_user }}/.vimrc" -c PluginInstall -c qa
